<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0c0c18"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a38;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c0c18;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8a6f42;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#c9a96e" stroke-width="1"/>
    <line x1="1200" y1="0" x2="0" y2="630" stroke="#c9a96e" stroke-width="1"/>
  </g>
  
  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="#c9a96e"/>
  
  <!-- Left accent element -->
  <rect x="0" y="100" width="8" height="430" fill="#c9a96e" opacity="0.6"/>
  
  <!-- Main headline -->
  <text x="600" y="140" font-family="Georgia, serif" font-size="72" font-weight="bold" text-anchor="middle" fill="#f2ede4">
    117 Years
  </text>
  
  <!-- Subheadline with gold accent -->
  <text x="600" y="240" font-family="Georgia, serif" font-size="68" text-anchor="middle" fill="#f2ede4">
    to One
  </text>
  
  <!-- Gold accent text -->
  <text x="600" y="320" font-family="Georgia, serif" font-size="68" font-style="italic" text-anchor="middle" fill="#c9a96e">
    Moment
  </text>
  
  <!-- Descriptive text -->
  <text x="600" y="400" font-family="Georgia, serif" font-size="28" text-anchor="middle" fill="#d8d0c0">
    The Unlikely Leadership That Changed Everything
  </text>
  
  <!-- Bottom description -->
  <text x="600" y="480" font-family="Georgia, serif" font-size="20" text-anchor="middle" fill="#9a9488">
    Curaçao's Path to FIFA World Cup 2026
  </text>
  
  <!-- Soccer ball accent (subtle) -->
  <g opacity="0.15">
    <circle cx="150" cy="500" r="40" fill="none" stroke="#c9a96e" stroke-width="2"/>
    <circle cx="150" cy="500" r="35" fill="none" stroke="#c9a96e" stroke-width="1"/>
  </g>
  
  <!-- Bottom accent bar -->
  <rect y="626" width="1200" height="4" fill="#c9a96e"/>
  
  <!-- Subtle branding -->
  <text x="1150" y="605" font-family="Didact Gothic, sans-serif" font-size="14" text-anchor="end" fill="#8a6f42" letter-spacing="3">
    THE REYES GROUP
  </text>
</svg>
