<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#1a1a2e"/>
  <rect x="30" y="30" width="340" height="340" fill="none" stroke="#c9a96e" stroke-width="1.5"/>
  <rect x="40" y="40" width="320" height="320" fill="none" stroke="#c9a96e" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Decorative top line -->
  <line x1="80" y1="120" x2="320" y2="120" stroke="#c9a96e" stroke-width="0.8" opacity="0.6"/>
  <line x1="80" y1="280" x2="320" y2="280" stroke="#c9a96e" stroke-width="0.8" opacity="0.6"/>
  
  <!-- THE -->
  <text x="200" y="158" font-family="Georgia, serif" font-size="18" fill="#c9a96e" text-anchor="middle" letter-spacing="8" opacity="0.9">THE</text>
  
  <!-- REYES -->
  <text x="200" y="218" font-family="Georgia, serif" font-size="52" fill="#c9a96e" text-anchor="middle" letter-spacing="6" font-weight="400">REYES</text>
  
  <!-- GROUP -->
  <text x="200" y="258" font-family="Georgia, serif" font-size="22" fill="#c9a96e" text-anchor="middle" letter-spacing="12" opacity="0.9">GROUP</text>
  
  <!-- Corner marks -->
  <path d="M50 70 L50 50 L70 50" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.7"/>
  <path d="M330 50 L350 50 L350 70" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.7"/>
  <path d="M50 330 L50 350 L70 350" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.7"/>
  <path d="M330 350 L350 350 L350 330" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.7"/>
</svg>
